# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main ] # Trigger only on pushes to the main branch
  pull_request:
    branches: [ main ] # Trigger only on PRs targeting the main branch

jobs:
  ci:                          # Job ID
    name: Lint, Test, Build    # Job Name 
    runs-on: ubuntu-latest     # Runner Specification
    steps:                     # Initial steps structure
      # Empty placeholder for steps that will be added in subsequent tasks